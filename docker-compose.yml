services:
  dynamodb-local:
    image: amazon/dynamodb-local
    command: -jar DynamoDBLocal.jar -sharedDb
    ports:
      - "8000:8000"

  lambda:
    image: ghcr.io/cargo-lambda/cargo-lambda
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "9000:9000"
    environment:
      - DYNAMODB_TABLE_NAME=word-manager-table
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_REGION=eu-west-2
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
    command: >
      cargo lambda watch --invoke-address 0.0.0.0
        --env-var DYNAMODB_TABLE_NAME=word-manager-table
        --env-var AWS_ACCESS_KEY_ID=local
        --env-var AWS_SECRET_ACCESS_KEY=local
        --env-var AWS_REGION=eu-west-2
        --env-var DYNAMODB_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      - dynamodb-local
